name: Auto Release (auto-chroot)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from script
        id: version
        run: |
          VERSION=$(grep 'VERSION=' auto-chroot.sh | head -n1 | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if tag exists
        id: tagcheck
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if not exists
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      # ----------------------------
      # Generate SHA256 (ESSENCIAL)
      # ----------------------------
      - name: Generate SHA256
        run: |
          sha256sum auto-chroot.sh > auto-chroot.sh.sha256

      # ----------------------------
      # Generate CHANGELOG
      # ----------------------------
      - name: Generate CHANGELOG
        run: |
          echo "# Changelog v$VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" >> CHANGELOG.md
          else
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s" >> CHANGELOG.md
          fi

      # ----------------------------
      # Prepare release files
      # ----------------------------
      - name: Prepare release files
        run: |
          mkdir dist
          cp auto-chroot.sh dist/
          cp auto-chroot.sh.sha256 dist/
          cp LICENSE dist/
          cp README.md dist/
          cp CHANGELOG.md dist/

          tar -czf auto-chroot-$VERSION.tar.gz -C dist .

      # ----------------------------
      # Create GitHub Release
      # ----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: auto-chroot v${{ env.VERSION }}
          body_path: CHANGELOG.md
          files: |
            auto-chroot.sh
            auto-chroot.sh.sha256
            auto-chroot-${{ env.VERSION }}.tar.gz
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
