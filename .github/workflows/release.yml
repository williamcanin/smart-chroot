name: Auto Release (auto-chroot)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        run: |
          VERSION=$(grep 'VERSION=' init.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create tag if missing
        run: |
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Prepare release files
        run: |
          cp init.sh auto-chroot.sh
          sha256sum auto-chroot.sh > auto-chroot.sh.sha256

      - name: Generate CHANGELOG
        run: |
          echo "# Changelog v$VERSION" > CHANGELOG.md
          PREV=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            git log --pretty=format:"- %s" >> CHANGELOG.md
          else
            git log "$PREV"..HEAD --pretty=format:"- %s" >> CHANGELOG.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          body_path: CHANGELOG.md
          files: |
            auto-chroot.sh
            auto-chroot.sh.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Pages from templates
        run: |
          mkdir -p pages/auto-chroot
          export VERSION=${{ env.VERSION }}

          envsubst < .github/pages/index.html.template > pages/index.html
          sed "s/__VERSION__/${{ env.VERSION }}/g" .github/pages/latest.template > pages/auto-chroot/latest

          chmod +x pages/auto-chroot/latest
          cp pages/auto-chroot/latest pages/auto-chroot/v$VERSION

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
